apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "dq.fullname" . }}-alerts
  labels:
    {{- include "dq.labels" . | nindent 4 }}
spec:
  groups:
    - name: dq-materializer
      rules:
        - alert: DQMaterializerDecodeLag
          expr: max by (type) (dq_materializer_lag_seconds) > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: materializer decode lag over 5m for 10m
            description: >-
              Raw cloudevents are arriving faster than the materializer
              decodes them ({{ "{{ $labels.type }}" }}). Queries serve stale
              data; din's raw compactor is also gated behind this cursor.
        - alert: DQMaterializerStalled
          expr: rate(dq_materializer_batches_total[30m]) == 0 and max(dq_materializer_lag_seconds) > 0
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: materializer has pending work but committed no batches in 30m
            description: watermark is not advancing — decode pipeline is stuck.
{{- if (.Values.prometheusRule | default dict).materializerEnabled }}
        - alert: DQMaterializerDown
          # The single-writer materializer is replicaCount:1 with no PDB. When it
          # is down / Pending after a node drain / CrashLooping, its gauges go
          # ABSENT — so Stalled (rate==0 AND lag>0) and DecodeLag never fire on the
          # missing series. absent_over_time alerts on the absence itself. Rendered
          # only in the materializer release, where the gauge is expected.
          expr: absent_over_time(dq_materializer_cursor_snapshot_id[15m])
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: materializer is not reporting (down, CrashLooping, or unscraped)
            description: >-
              No materializer metric scraped for 15m — the single-writer
              materializer is not running. Decode has halted; restart it before
              lag passes LAKE_SNAPSHOT_RETENTION → cursor reset
              (DQMaterializerCursorReset) and permanent data loss.
{{- end }}
        - alert: DQMaterializerCursorReset
          expr: increase(dq_materializer_cursor_resets_total[1h]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: DuckLake materializer skipped an un-decoded snapshot range
            description: >-
              The decode cursor lagged past LAKE_SNAPSHOT_RETENTION and was reset
              to head, permanently skipping un-decoded raw events
              ({{ "{{ $value }}" }} resets; span in
              dq_materializer_last_cursor_reset_gap_snapshots). Backfill the
              skipped range, then raise retention or decode throughput.
        # End-to-end decode backlog as a single number (CHD-14): how many
        # DuckLake snapshots the decoder is behind the committed head. Pair with
        # din's head-age metric for the full pipeline lag.
        - record: dq:pipeline_snapshot_backlog
          expr: max(dq_materializer_head_snapshot_id) - max(dq_materializer_cursor_snapshot_id)
        # Background-loop failures were only logged, never alerted (SR-14).
        - alert: DQMaterializerPruneErrors
          expr: increase(dq_materializer_prune_errors_total[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: decoded-retention prune is failing
            description: PruneDecoded errored; decoded tables grow past retention until it recovers.
        - alert: DQMaterializerCompactionErrors
          expr: increase(dq_materializer_compaction_errors_total[1h]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: decoded-layer compaction is failing
            description: Small files accumulate, inflating per-query S3 GET cost, until compaction recovers.
        # Early warning that the per-batch rollup recompute is growing with
        # history (the SR-1 O(history) cost) before it gates decode throughput.
        - alert: DQMaterializerRollupRefreshSlow
          expr: dq_materializer_rollup_refresh_seconds > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: signals_latest rollup refresh is slow
            description: >-
              The per-batch rollup recompute exceeds 10s, growing with per-vehicle
              history. It runs inside the commit transaction, so it caps decode
              throughput — consider the incremental-merge follow-up (SR-1).
