apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dq.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
spec:
  data:
  # S3 credentials for DuckDB httpfs (lake reads/writes) + the fetch blob GET.
  # Shared with din (same lake + blob storage).
  - remoteRef:
      key: {{ .Release.Namespace }}/dis/s3/access_key_id
    secretKey: S3_AWS_ACCESS_KEY_ID
  - remoteRef:
      key: {{ .Release.Namespace }}/dis/s3/secret_access_key
    secretKey: S3_AWS_SECRET_ACCESS_KEY
  # The DuckLake catalog Postgres DSN (the same catalog din writes). Required —
  # the service fatals on boot if empty.
  - remoteRef:
      key: {{ .Release.Namespace }}/dq/ducklake_catalog_dsn
    secretKey: DUCKLAKE_CATALOG_DSN
  # Optional read-replica DSN for the autoscaled query fleet. Without it every
  # query pod resolves snapshots/file lists against the PRIMARY catalog,
  # coupling read QPS to the write path's database (H17/H18). The materializer
  # release ignores it (single writer uses the primary).
  - remoteRef:
      key: {{ .Release.Namespace }}/dq/ducklake_catalog_read_dsn
    secretKey: DUCKLAKE_CATALOG_READ_DSN
  # Blob at-rest decryption key — MUST be the same remote key din's chart wires
  # for its BLOB_ENCRYPTION_KEY (din seals, dq opens). NewCipher("") no-ops, so
  # omitting this silently serves ciphertext-era blobs unreadable (H17).
  - remoteRef:
      key: {{ .Release.Namespace }}/din/blob_encryption_key
    secretKey: BLOB_ENCRYPTION_KEY

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-secret-store
  target:
    name: {{ include "dq.fullname" . }}-secret
    template:
      metadata: {}
