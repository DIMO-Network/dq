# dq MATERIALIZER release overlay — the single-writer decode loop. Deploy as a
# SEPARATE release layered on values-prod.yaml:
#
#   helm upgrade --install dq-materializer ./charts/dq \
#     -f charts/dq/values-prod.yaml -f charts/dq/values-materializer.yaml
#
# It creates and fills the decoded tables (lake.signals / lake.events /
# lake.signals_latest / lake.ingest_progress) that the query fleet reads — the
# query fleet's readiness probe (SELECT 1 FROM lake.signals) cannot pass until
# this release has run at least once. Exactly one replica (the deployment guard
# rejects >1; the chart default strategy Recreate prevents a rolling overlap).

replicaCount: 1
# Pin Recreate for the single writer: this overlay layers on values-prod.yaml, which
# sets RollingUpdate for the query fleet (C3). Two materializer pods must NEVER overlap
# during a deploy (the deployment guard rejects >1 replica), so override back to Recreate
# and null out the inherited rollingUpdate block (Recreate + rollingUpdate is invalid).
strategy:
  type: Recreate
  rollingUpdate: null
autoscaling:
  enabled: false
podDisruptionBudget:
  # Single writer — don't keep a replica available across disruptions.
  minAvailable: 0

# Not a public API: only the decode loop + /metrics + /ready. No ingress.
ingress:
  enabled: false

# The materializer-liveness alert (DQMaterializerDown) only makes sense here,
# where the materializer metrics are actually emitted.
prometheusRule:
  materializerEnabled: true

env:
  MATERIALIZER_ENABLED: 'true'
  # Rollup flush cadence, decoupled from the 15s poll (B2/M6): each flush
  # recomputes only the subjects dirtied since the last one, but every flush
  # still mints catalog snapshots and small rollup files — 60s batches 4x the
  # subjects per flush for 1/4 the snapshot churn, at the cost of latest/
  # summary reads lagging up to a minute during a drain.
  MATERIALIZER_ROLLUP_INTERVAL: '60s'
  # The single writer attaches the catalog read-write (backend.go also force-
  # disables read-only when MATERIALIZER_ENABLED, but set it explicitly). It uses
  # the primary catalog DSN, never a read replica.
  DUCKLAKE_READ_ONLY: 'false'
  # Bound decoded-table growth: prune lake.signals/events older than this (Go
  # duration; ~1y). Empty lets them grow unbounded.
  LAKE_DECODED_RETENTION: 8760h
  # Decode + rollup recompute are memory-heavy (one pod). Size memory_limit to
  # ~75% of the pod memory limit; threads to the CPU limit. This is the DECODE
  # instance's budget.
  DUCKDB_MEMORY_LIMIT: 6GiB
  DUCKDB_THREADS: 4
  # This release always ALSO builds a query DuckDB instance (main.go serves the
  # query HTTP/gRPC unconditionally), but it receives no traffic here: no ingress,
  # and the query fleet is a separate release with its own Service. Without this it
  # would honor the 6GiB DUCKDB_MEMORY_LIMIT too, so decode(6) + query(6) = 12GiB
  # can OOM the 8Gi pod (finding #7). Cap the idle query instance at 1GiB so the two
  # limits sum to 7GiB < 8Gi; only a query pod (MATERIALIZER_ENABLED=false) ignores
  # this and keeps the full budget.
  DUCKDB_QUERY_MEMORY_LIMIT: 1GiB

resources:
  limits:
    cpu: 4
    memory: 8Gi
  requests:
    cpu: 1
    memory: 2Gi
duckdbTempSizeLimit: 20Gi
