replicaCount: 2
image:
  repository: dimozone/dq
  pullPolicy: IfNotPresent
  tag: ''
env:
  PORT: 8080
  MON_PORT: 8888
  # DuckLake query-fleet DuckDB sizing (CHD-20): memory_limit ~75% of the 8Gi
  # pod, threads = CPU limit.
  DUCKDB_MEMORY_LIMIT: 6GiB
  DUCKDB_THREADS: 4
  # Query fleet never writes the lake — only the single-writer materializer
  # does — so attach the DuckLake catalog read-only. This keeps the 2-10
  # autoscaled query replicas off the primary catalog as writers and lets them
  # read from a Postgres read replica (set DUCKLAKE_CATALOG_READ_DSN).
  # backend.go force-disables it on the materializer release so the writer can
  # never come up read-only.
  DUCKLAKE_READ_ONLY: 'true'
  # Prod lake (must match din's prod LAKE_DATA_PATH) + the prod externalized-blob
  # bucket (din's prod BLOB_BUCKET).
  DUCKLAKE_DATA_PATH: s3://dimo-storage-prod/lake/
  BLOB_BUCKET: dimo-blob-storage-prod
  # Prod auth + identity-api + registry (chain 137), mirroring din's prod values.
  TOKEN_EXCHANGE_JWK_KEY_SET_URL: https://auth.dimo.zone/keys
  TOKEN_EXCHANGE_ISSUER_URL: https://auth.dimo.zone
  IDENTITY_API_URL: https://identity-api.dimo.zone/query
  DIMO_REGISTRY_CHAIN_ID: 137
  VEHICLE_NFT_ADDRESS: '0xbA5738a18d83D41847dfFbDC6101d37C69c9B0cF'
  AFTERMARKET_NFT_ADDRESS: '0x9c94C395cBcBDe662235E0A9d3bB87Ad708561BA'
  SYNTHETIC_NFT_ADDRESS: '0x4804e8D1661cd1a1e5dDdE1ff458A7f878c0aC6D'
  # Lock down the unauthenticated gRPC fetch port in prod (it returns any
  # subject's raw data). Require a JWT; optionally also enable the NetworkPolicy.
  FETCH_GRPC_REQUIRE_JWT: 'true'
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/auth-tls-secret: ingress/cf-origin-ca
    nginx.ingress.kubernetes.io/auth-tls-verify-client: 'on'
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-allow-origin: https://app.dimo.zone, https://admin.team.dimo.zone
    nginx.ingress.kubernetes.io/limit-rps: '50'
    external-dns.alpha.kubernetes.io/hostname: dq.dimo.zone
  hosts:
    - host: dq.dimo.zone
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
# DuckLake query fleet (CHD-20). DuckDB scans are CPU+memory heavy and spill to
# DUCKDB_TEMP_DIRECTORY; 1 CPU / 1Gi OOM-killed before spilling. Sized for the
# ducklake target — see DUCKDB_MEMORY_LIMIT above (≈75% of the memory limit).
resources:
  limits:
    cpu: 4
    memory: 8Gi
  requests:
    cpu: 1
    memory: 2Gi
duckdbTempSizeLimit: 20Gi
# HPA on CPU and memory for the query fleet (MATERIALIZER_ENABLED=false). The
# materializer runs as a separate replicaCount=1, autoscaling-off release
# (enforced by the deployment guard).
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
nodeSelector: {}
tolerations: []
affinity: {}
podDisruptionBudget:
  minAvailable: 1
