replicaCount: 1
image:
  repository: dimozone/dq
  pullPolicy: IfNotPresent
  tag: ''
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  create: true
  annotations: {}
  name: ''
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1001
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
cronJob:
  enabled: false
  schedule: 0 0 * * 0
# Recreate: the embedded materializer + decoded compactor are
# single-writer components — two pods must never overlap during a deploy
# until leader election lands. Query-only fleets (MATERIALIZER_ENABLED=false)
# can switch back to RollingUpdate and scale replicas freely.
strategy:
  type: Recreate
env:
  PORT: 8080
  MON_PORT: 8888
  GRPC_PORT: 8086
  ENVIRONMENT: dev
  QUERY_BACKEND: clickhouse
  PARQUET_BUCKET: dimo-storage-dev
  RAW_PREFIX: raw/
  DECODED_PREFIX: decoded/v1/
  MATERIALIZER_ENABLED: 'false'
  MATERIALIZER_POLL_INTERVAL: 15s
  # DuckDB runtime sizing (CHD-20). memory_limit must be ~75% of the pod memory
  # limit — DuckDB otherwise sizes to 80% of NODE RAM, blind to the cgroup, and
  # OOM-kills before spilling. threads must match the CPU limit (default 64
  # throttled to 1 CPU). temp_directory gives a spill volume so large scans
  # spill to disk instead of OOMing. These base values suit the small dev pod;
  # values-prod raises them with the pod size.
  DUCKDB_MEMORY_LIMIT: 256MiB
  DUCKDB_THREADS: 1
  DUCKDB_TEMP_DIRECTORY: /tmp/duckdb
  S3_AWS_REGION: us-east-2
  DIMO_REGISTRY_CHAIN_ID: 80002
  VEHICLE_NFT_ADDRESS: '0x45fbCD3ef7361d156e8b16F5538AE36DEdf61Da8'
  AFTERMARKET_NFT_ADDRESS: '0x325b45949C833986bC98e98a49F3CA5C5c4643B5'
  SYNTHETIC_NFT_ADDRESS: '0x78513c8CB4D6B6079f813850376bc9c7fc8aE67f' 
service:
  type: ClusterIP
  ports:
    mon-http:
      port: 8888
      targetPort: mon-http
      protocol: TCP
    http:
      port: 8080
      targetPort: http
      protocol: TCP
    grpc:
      port: 8086
      targetPort: grpc
      protocol: TCP
ports:
  - name: mon-http
    containerPort: 8888
    protocol: TCP
  - name: http
    containerPort: 8080
    protocol: TCP
  - name: grpc
    containerPort: 8086
    protocol: TCP
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/auth-tls-secret: ingress/cf-origin-ca
    nginx.ingress.kubernetes.io/auth-tls-verify-client: 'on'
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-allow-origin: https://app.dev.dimo.zone, https://admin.dev.dimo.zone
    nginx.ingress.kubernetes.io/limit-rps: '25'
    external-dns.alpha.kubernetes.io/hostname: dq.dev.dimo.zone
  hosts:
    - host: dq.dev.dimo.zone
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
resources:
  limits:
    cpu: 250m
    memory: 384Mi
  requests:
    cpu: 5m
    memory: 32Mi
# Size of the emptyDir backing DUCKDB_TEMP_DIRECTORY (DuckDB spill). Only
# mounted when env.DUCKDB_TEMP_DIRECTORY is set. Raise in values-prod.
duckdbTempSizeLimit: 5Gi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
podDisruptionBudget:
  minAvailable: 0
kafka:
  clusterName: kafka-dev-dimo-kafka
  topics: []
serviceMonitor:
  enabled: true
  path: /metrics
  port: mon-http
  interval: 30s
