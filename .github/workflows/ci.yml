name: CI
# Run the full suite on every commit: `push` fires for every branch, and
# `pull_request` is kept only for forks (whose commits never trigger push here)
# so internal branches aren't tested twice.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (rapid pushes / force-pushes), but let
# default-branch runs always finish so every merged commit is fully tested.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  build-test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      # PG/MinIO integration suites (test-gated) skip cleanly without their env vars.
      - run: go test ./...

  race:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Plain -race works since duckdb-go v2.10504.0 (fixes the checkptr/getBytes crash).
      - run: go test -race ./...

  lint:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Pin golangci-lint v2 (matches .golangci.yml's `version: "2"`) via go install —
      # avoids the action's version matrix.
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
      - run: golangci-lint run --timeout=5m ./...
